name: Copilot Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Specific merged PR number to review (leave blank to review all merges to main in last 7 days)'
        required: false
        type: string
      reviewer:
        description: 'GitHub username to request review from (in addition to original PR author)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-review:
    name: GitHub Copilot SQL & dbt Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve PRs to review
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "Targeting specific PR: #${{ inputs.pr_number }}"
            echo "${{ inputs.pr_number }}" > /tmp/pr_list.txt
          else
            echo "Finding PRs merged to main in the last 7 days..."
            SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
            gh pr list \
              --state merged \
              --base main \
              --search "merged:>=$SINCE" \
              --json number \
              --jq '.[].number' > /tmp/pr_list.txt
          fi

          if [ ! -s /tmp/pr_list.txt ]; then
            echo "No PRs to review."
            echo "any_prs=false" >> $GITHUB_OUTPUT
          else
            echo "PRs to review: $(cat /tmp/pr_list.txt | tr '\n' ' ')"
            echo "any_prs=true" >> $GITHUB_OUTPUT
          fi

      - name: Review each PR and create fix PRs
        if: steps.resolve.outputs.any_prs == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)

          while IFS= read -r PR_NUM; do
            echo "========================================"
            echo "Processing PR #$PR_NUM"
            echo "========================================"

            # Get PR metadata
            PR_AUTHOR=$(gh pr view "$PR_NUM" --json author --jq '.author.login')
            PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title')

            # Get model files changed in this PR
            FILES=$(gh pr view "$PR_NUM" --json files \
              --jq '[.files[].path | select(test("^models/.*\\.(sql|yml)$"))] | .[]')

            if [ -z "$FILES" ]; then
              echo "PR #$PR_NUM touched no model files — skipping."
              continue
            fi

            echo "Model files in scope:"
            echo "$FILES"
            echo "$FILES" > /tmp/review_files.txt

            # Fresh branch off main for this PR's fixes
            git checkout -f main
            BRANCH="copilot-auto-review/pr-${PR_NUM}-${TIMESTAMP}"
            git checkout -b "$BRANCH"

            # Run Copilot review scoped to this PR's files only
            copilot -p "
              You are an expert dbt and Snowflake SQL code reviewer.

              Read the file .github/copilot-instructions.md — it defines 4 rules
              every model must follow.

              Read the file /tmp/review_files.txt — review ONLY the files listed
              there against the 4 rules. Do not touch any other files.

              For every violation you find, fix it directly in the file.

              When done, run: git diff --name-only
              Then commit all changed files with:
                git add models/
                git commit -m 'Copilot auto-review: fixes for PR #${PR_NUM}'
              If there are no violations, do not commit anything.
            " \
              --allow-tool="read" \
              --allow-tool="write" \
              --allow-tool="shell(git:*)" \
              --no-ask-user

            # Only push and open PR if Copilot actually found and fixed something
            CHANGES=$(git log origin/main..HEAD --oneline)
            if [ -z "$CHANGES" ]; then
              echo "No violations found in PR #$PR_NUM — nothing to fix."
              git checkout -f main
              git branch -D "$BRANCH"
              continue
            fi

            git push origin "$BRANCH"

            # Build reviewer list: always tag original author, add second reviewer if provided
            REVIEWERS="$PR_AUTHOR"
            if [ -n "${{ inputs.reviewer }}" ]; then
              REVIEWERS="$REVIEWERS,${{ inputs.reviewer }}"
            fi

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Copilot auto-review: fixes for #${PR_NUM} – ${PR_TITLE}" \
              --body "## Copilot Auto-Review

            Automated code review against \`.github/copilot-instructions.md\` for changes introduced in #${PR_NUM}.

            | | |
            |---|---|
            | **Original PR** | #${PR_NUM} |
            | **Original author** | @${PR_AUTHOR} |

            Please review the suggested fixes. Approve what makes sense, request changes, or close this PR if fixes are not applicable.

            > :robot: Generated by the [Copilot Code Review workflow](/.github/workflows/copilot-review.yml)" \
              --reviewer "$REVIEWERS"

            echo "Fix PR created for #$PR_NUM, reviewers: $REVIEWERS"
            git checkout -f main

          done < /tmp/pr_list.txt


