name: Copilot Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-review:
    name: GitHub Copilot SQL & dbt Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up branch from any previous run
          git push origin --delete copilot-auto-review/fixes 2>/dev/null || true
          git checkout -b copilot-auto-review/fixes

      - name: Run Copilot review and apply fixes
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot -p "
            You are an expert dbt and Snowflake SQL code reviewer.

            Read the file .github/copilot-instructions.md — it defines 4 rules
            every model must follow. Then review every .sql and .yml file under
            the models/ directory against those 4 rules.

            For every violation you find, fix it directly in the file.

            When done, run: git diff --name-only
            Then commit all changed files with:
              git add models/
              git commit -m 'Copilot auto-review: apply code review fixes'
            If there are no violations, do not commit anything.
          " \
            --allow-tool="read" \
            --allow-tool="write" \
            --allow-tool="shell(git:*)" \
            --no-ask-user

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only create PR if there are commits ahead of main
          CHANGES=$(git log origin/main..HEAD --oneline)
          if [ -z "$CHANGES" ]; then
            echo "No violations found — no PR needed."
            exit 0
          fi

          git push origin copilot-auto-review/fixes

          gh pr create \
            --base main \
            --head copilot-auto-review/fixes \
            --title "Copilot auto-review: code review fixes" \
            --body "Automated code review by Copilot CLI against \`.github/copilot-instructions.md\`.

          See the commit diff for full details of fixes applied."

