name: Copilot Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-review:
    name: GitHub Copilot SQL & dbt Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot review and create fix PR
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copilot -p "
            You are an expert dbt and Snowflake SQL code reviewer.

            Read the file .github/copilot-instructions.md — it defines 4 rules
            every model must follow. Then review every .sql and .yml file under
            the models/ directory against those 4 rules.

            For every violation you find, fix it directly in the file.

            After all fixes are applied:
            1. Create a new git branch named 'copilot-auto-review/fixes'
            2. Commit all changed files with message 'Copilot auto-review: apply code review fixes'
            3. Push the branch to origin
            4. Open a pull request to main with:
               - Title: 'Copilot auto-review: code review fixes'
               - Body: a markdown table listing each file, the rule violated, and what was fixed

            Use git and gh CLI to perform the branch, commit, push and PR steps.
          " \
            --allow-tool="read" \
            --allow-tool="write" \
            --allow-tool="shell(git:*)" \
            --allow-tool="shell(gh:*)" \
            --no-ask-user
