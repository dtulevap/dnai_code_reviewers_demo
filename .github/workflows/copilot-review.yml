name: Copilot Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-review:
    name: GitHub Copilot SQL & dbt Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="copilot-auto-review/$(date -u +%Y%m%d-%H%M%S)"
          echo "REVIEW_BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Get recently changed model files
        id: changed
        run: |
          FILES=$(git log --since="7 days ago" --name-only --pretty=format: -- models/ \
            | grep -E '\.(sql|yml)$' | sort -u)
          if [ -z "$FILES" ]; then
            echo "No model files changed in the last 7 days."
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "Files to review:"
            echo "$FILES"
            # Write list to a file so Copilot can read it
            echo "$FILES" > /tmp/changed_files.txt
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Copilot review and apply fixes
        if: steps.changed.outputs.any_changed == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot -p "
            You are an expert dbt and Snowflake SQL code reviewer.

            Read the file .github/copilot-instructions.md — it defines 4 rules
            every model must follow.

            Read the file /tmp/changed_files.txt — it contains the list of
            model files changed in the last 7 days. Review ONLY those files
            against the 4 rules.

            For every violation you find, fix it directly in the file.

            When done, run: git diff --name-only
            Then commit all changed files with:
              git add models/
              git commit -m 'Copilot auto-review: apply code review fixes'
            If there are no violations, do not commit anything.
          " \
            --allow-tool="read" \
            --allow-tool="write" \
            --allow-tool="shell(git:*)" \
            --no-ask-user

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only create PR if there are commits ahead of main
          CHANGES=$(git log origin/main..HEAD --oneline)
          if [ -z "$CHANGES" ]; then
            echo "No violations found — no PR needed."
            exit 0
          fi

          git push origin "$REVIEW_BRANCH"

          gh pr create \
            --base main \
            --head "$REVIEW_BRANCH" \
            --title "Copilot auto-review: code review fixes" \
            --body "Automated code review by Copilot CLI against \`.github/copilot-instructions.md\`.

          See the commit diff for full details of fixes applied."

