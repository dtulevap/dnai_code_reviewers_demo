name: DnAI Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-review:
    name: GitHub Copilot SQL & dbt Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve scope — main (merged PRs) or feature branch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.AUTO_REVIEW_ACTIONS_PAT }}
        run: |
          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "main" ]; then
            echo "Mode: main — finding PRs merged in last 7 days"
            SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
            gh pr list \
              --state merged \
              --base main \
              --search "merged:>=$SINCE" \
              --json number,headRefName \
              --jq '[.[] | select(.headRefName | startswith("copilot-auto-review/") | not)] | .[].number' > /tmp/pr_list.txt

            if [ ! -s /tmp/pr_list.txt ]; then
              echo "No PRs merged in the last 7 days."
              echo "any_work=false" >> $GITHUB_OUTPUT
            else
              echo "PRs to review: $(cat /tmp/pr_list.txt | tr '\n' ' ')"
              echo "mode=main" >> $GITHUB_OUTPUT
              echo "any_work=true" >> $GITHUB_OUTPUT
            fi

          else
            echo "Mode: branch — reviewing all model files changed in $BRANCH vs main"
            git fetch origin main
            FILES=$(git diff origin/main...HEAD --name-only -- 'models/**/*.sql' 'models/**/*.yml')

            if [ -z "$FILES" ]; then
              echo "No model files changed in branch $BRANCH vs main."
              echo "any_work=false" >> $GITHUB_OUTPUT
            else
              echo "Files to review:"
              echo "$FILES"
              echo "$FILES" > /tmp/review_files.txt

              # Try to find an associated open PR for this branch
              PR_NUM=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
              PR_AUTHOR=$(gh pr list --state open --head "$BRANCH" --json author --jq '.[0].author.login // empty')
              echo "pr_num=${PR_NUM}" >> $GITHUB_OUTPUT
              echo "pr_author=${PR_AUTHOR}" >> $GITHUB_OUTPUT
              echo "mode=branch" >> $GITHUB_OUTPUT
              echo "any_work=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Review merged PRs (main mode)
        if: steps.resolve.outputs.any_work == 'true' && steps.resolve.outputs.mode == 'main'
        env:
          GH_TOKEN: ${{ secrets.AUTO_REVIEW_ACTIONS_PAT }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d-%H%M)

          while IFS= read -r PR_NUM; do
            echo "========================================"
            echo "Processing PR #$PR_NUM"
            echo "========================================"

            PR_AUTHOR=$(gh pr view "$PR_NUM" --json author --jq '.author.login')

            # Skip if PR was opened by a bot (login contains [bot] or app/ prefix)
            if echo "$PR_AUTHOR" | grep -qE '(\[bot\]|^app/)'; then
              echo "PR #$PR_NUM author ($PR_AUTHOR) is a bot — skipping."
              continue
            fi
            PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title')
            FILES=$(gh pr view "$PR_NUM" --json files \
              --jq '[.files[].path | select(test("^models/.*\\.(sql|yml)$"))] | .[]')

            if [ -z "$FILES" ]; then
              echo "PR #$PR_NUM has no model file changes — skipping."
              continue
            fi

            FILE_COUNT=$(echo "$FILES" | wc -l)
            echo "$FILES" > /tmp/review_files.txt

            git checkout -f main
            BRANCH="copilot-auto-review/pr-${PR_NUM}-$(date -u +%Y-%m-%d-%H%M)"
            git checkout -b "$BRANCH"

            PROMPT=$(cat .github/dnai-code-review-init-prompt.md \
              | sed "s|{{COMMIT_CONTEXT}}|PR #${PR_NUM}|g")

            copilot -p "$PROMPT" \
              --allow-tool="read" \
              --allow-tool="write" \
              --allow-tool="shell(git:*)" \
              --allow-tool="shell(cat:*)" \
              --allow-tool="shell(find:*)" \
              --allow-tool="shell(echo:*)" \
              --no-ask-user

            CHANGES=$(git log origin/main..HEAD --oneline)
            if [ -z "$CHANGES" ]; then
              echo "No violations in PR #$PR_NUM — skipping."
              git checkout -f main
              git branch -D "$BRANCH"
              continue
            fi

            git push origin "$BRANCH"

            REVIEWERS="$PR_AUTHOR"

            BODY=$(cat .github/dnai-code-review-pr-template.md \
              | sed "s|{{SOURCE_LABEL}}|PR #${PR_NUM}|g" \
              | sed "s|{{SOURCE_LINK}}|#${PR_NUM}|g" \
              | sed "s|{{AUTHOR}}|${PR_AUTHOR}|g" \
              | sed "s|{{FILE_COUNT}}|${FILE_COUNT}|g")

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Copilot auto-review: fixes for #${PR_NUM} – ${PR_TITLE}" \
              --body "$BODY" \
              --reviewer "$REVIEWERS"

            echo "Fix PR created for #$PR_NUM"
            git checkout -f main
          done < /tmp/pr_list.txt

      - name: Review feature branch (branch mode)
        if: steps.resolve.outputs.any_work == 'true' && steps.resolve.outputs.mode == 'branch'
        env:
          GH_TOKEN: ${{ secrets.AUTO_REVIEW_ACTIONS_PAT }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          SOURCE_BRANCH="${{ github.ref_name }}"
          PR_NUM="${{ steps.resolve.outputs.pr_num }}"
          PR_AUTHOR="${{ steps.resolve.outputs.pr_author }}"
          FILE_COUNT=$(cat /tmp/review_files.txt | wc -l)

          # Stay on the feature branch — commit fixes directly here
          PROMPT=$(cat .github/dnai-code-review-init-prompt.md \
            | sed "s|{{COMMIT_CONTEXT}}|branch ${SOURCE_BRANCH}|g")

          copilot -p "$PROMPT" \
            --allow-tool="read" \
            --allow-tool="write" \
            --allow-tool="shell(git:*)" \
            --allow-tool="shell(cat:*)" \
            --allow-tool="shell(find:*)" \
            --allow-tool="shell(echo:*)" \
            --no-ask-user

          CHANGES=$(git log origin/${SOURCE_BRANCH}..HEAD --oneline)
          if [ -z "$CHANGES" ]; then
            echo "No violations found in branch $SOURCE_BRANCH — nothing to fix."
            exit 0
          fi

          # Push fixes directly onto the feature branch
          git push origin "HEAD:${SOURCE_BRANCH}"

          # If there is an open PR for this branch, post a comment summarising the fixes
          if [ -n "$PR_NUM" ]; then
            gh pr comment "$PR_NUM" \
              --body ":robot: **Copilot auto-review** committed fixes directly to this branch.

          ${FILE_COUNT} model file(s) were reviewed against \`.github/copilot-instructions.md\`. See the latest commit for details."
          fi

