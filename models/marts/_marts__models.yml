version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension table. One row per customer with
      aggregated order statistics and lifetime value.
    columns:
      - name: customer_id
        description: Primary key – unique identifier for the customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: email
        description: Customer's email address.
        tests:
          - unique
          - not_null
      - name: customer_created_at
        description: Timestamp when the customer account was created.
      - name: first_order_date
        description: Date of the customer's first order.
      - name: most_recent_order_date
        description: Date of the customer's most recent order.
      - name: number_of_orders
        description: Total number of orders placed by the customer.
      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.

  - name: fct_orders
    description: >
      Order fact table. One row per order enriched with customer
      details and payment breakdown by method.
    columns:
      - name: order_id
        description: Primary key – unique identifier for the order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: email
        description: Customer's email address.
      - name: order_date
        description: Date when the order was placed.
      - name: status
        description: Current status of the order.
        tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: order_amount
        description: Order amount recorded in the orders source.
      - name: credit_card_amount
        description: Amount paid via credit card.
      - name: debit_card_amount
        description: Amount paid via debit card.
      - name: bank_transfer_amount
        description: Amount paid via bank transfer.
      - name: gift_card_amount
        description: Amount paid via gift card.
      - name: coupon_amount
        description: Amount paid via coupon.
      - name: amount
        description: Total amount paid across all payment methods.

  - name: dim_customer_segments
    description: >
      Customer segmentation model. One row per customer enriched with
      value and order-frequency segments derived from dim_customers.
    columns:
      - name: customer_id
        description: Primary key – unique identifier for the customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: email
        description: Customer's email address.
      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.
      - name: value_segment
        description: Revenue-based segment for the customer (high, medium, low).
      - name: order_segment
        description: Order-frequency segment for the customer (loyal, repeat, one-time).
