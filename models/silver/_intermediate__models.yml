version: 2

models:
  - name: int_customers
    description: >
      Customers enriched with aggregated order statistics.
      One row per customer with lifetime value and order frequency metrics.
    columns:
      - name: customer_id
        description: Primary key – unique identifier for the customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: email
        description: Customer's email address.
        tests:
          - unique
          - not_null
      - name: customer_created_at
        description: Timestamp when the customer account was created.
      - name: first_order_date
        description: Date of the customer's first order.
      - name: most_recent_order_date
        description: Date of the customer's most recent order.
      - name: number_of_orders
        description: Total number of orders placed by the customer.
      - name: lifetime_value
        description: Total revenue generated by the customer across all orders.

  - name: int_orders_with_payments
    description: >
      Orders enriched with payment breakdown by payment method.
      Each row represents one order with aggregated payment totals.
    columns:
      - name: order_id
        description: Primary key – unique identifier for the order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_customers.
        tests:
          - not_null
      - name: order_date
        description: Date when the order was placed.
      - name: status
        description: Current status of the order.
      - name: order_amount
        description: Total order amount recorded in the orders table.
      - name: credit_card_amount
        description: Total amount paid by credit card.
      - name: debit_card_amount
        description: Total amount paid by debit card.
      - name: bank_transfer_amount
        description: Total amount paid by bank transfer.
      - name: gift_card_amount
        description: Total amount paid by gift card.
      - name: coupon_amount
        description: Total amount paid by coupon.
      - name: amount
        description: Total amount paid across all payment methods.
